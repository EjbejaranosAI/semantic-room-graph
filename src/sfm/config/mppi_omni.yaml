# Preset Nav2 controller para PAL (reemplazo de mppi_omni.yaml)
# Uso: copiar a /opt/pal/alum/share/pal_navigation_cfg/presets/nav2_controller/mppi_omni.yaml
# Contiene: SFM con parámetros tipo paper (Robot Companion) + anti-retroceso en puertas/pasillos.
# Para volver a MPPI: cambiar controller_plugins a ["FollowPath_ori"] y renombrar bloques si hace falta.

ros__parameters:
  use_sim_time: true
  controller_frequency: 50.0
  min_x_velocity_threshold: 0.001
  min_y_velocity_threshold: 0.0
  min_theta_velocity_threshold: 0.001
  failure_tolerance: 0.3
  progress_checker_plugin: "progress_checker"
  goal_checker_plugins: ["general_goal_checker"]
  controller_plugins: ["FollowPath"]
  odom_topic: "mobile_base_controller/odom"
  speed_limit_topic: "speed_limit"

  progress_checker:
    plugin: "nav2_controller::SimpleProgressChecker"
    required_movement_radius: 0.5
    movement_time_allowance: 10.0

  general_goal_checker:
    plugin: "nav2_controller::SimpleGoalChecker"
    xy_goal_tolerance: 0.2
    yaw_goal_tolerance: 0.15
    stateful: true

  # === SFM Controller (paper-aligned: Eq. 9 goal relaxation, Eq. 5 repulsion, Eq. 6 anisotropy, Eq. 14 combination) ===
  FollowPath:
    plugin: "sfm_controller_plugin::SfmController"

    # Paper-like repulsion (tabla robot-persona: A≈2.66, B≈0.79, d≈0.4). Para obstáculos estáticos algo conservador.
    A: 2.7
    B: 0.8
    d: 0.4

    alpha: 2.0
    beta: 0.0
    gamma: 0.0
    delta: 0.7   # Si sigue "rebotando", bajar a 0.6–0.7
    # Anisotropía (Eq. 6): λ≈0.6 → menos repulsión por detrás, evita que la resultante apunte atrás 
    lambda: 0.7

    # Relajación (k): paper k≈2.3
    k_lin: 2.3
    k_ang: 2.3
    d_lin: 0.35
    d_ang: 0.35
    max_linear_vel: 0.45
    max_angular_vel: 0.55
    tolerance: 0.15

    # Costmap threshold: 253 = inscribed + lethal (skip pure inflation)
    obstacle_cost_threshold: 253.0
    dist_threshold: 0.12
    end_force: 0.1
    goal_force_scale: 2.0
    # Safety cap on total |F_rep|. With 8 sectors, raw sum rarely exceeds 5.0.
    # Lower cap = robot can enter corridors; too low = ignores walls.
    max_repulsive_magnitude: 5.0

    lookahead_distance: 1.0
    transform_tolerance: 0.3
    allow_backward: false
    # With paper-pure anisotropy (e_r), bias can be lower or zero
    path_bias_gain: 2.0
    use_goal_relaxation: true   # Paper Eq. 9: f_goal = k_r * (v_desired - v_current)

    prune_distance: 0.3
    use_adaptive_lookahead: true
    min_lookahead_distance: 0.4
    max_lookahead_distance: 1.5

    # Raycast-based frontal obstacle detection thresholds
    slow_down_dist: 0.5    # Slowdown when raycast front obstacle closer than this (m)
    stop_dist: 0.10        # Hard stop only when obstacle ON the goal ray is this close

    publish_debug_markers: true
    publish_debug_stats: true
    publish_param_stats: true
    marker_scale: 0.5        # Escala flechas (fuerzas); aumentar si no se ven
    marker_line_scale: 0.08   # Grosor flechas; aumentar si son muy finas
    marker_text_scale: 0.15  # Tamaño texto; aumentar si no se lee

  # MPPI original (por si se quiere volver)
  FollowPath_ori:
    plugin: "nav2_mppi_controller::MPPIController"
    time_steps: 56
    model_dt: 0.02
    batch_size: 2000
    vx_std: 0.5
    vx_min: 0.0
    vx_max: 0.5
    wz_std: 0.5
    wz_max: 0.7
    ax_max: 1.0
    az_max: 2.5
    iteration_count: 1
    prune_distance: 1.0
    transform_tolerance: 0.3
    temperature: 0.3
    gamma: 0.015
    motion_model: "DiffDrive"
    critics:
      [
        "ConstraintCritic",
        "CostCritic",
        "GoalCritic",
        "GoalAngleCritic",
        "PathAlignCritic",
        "PathFollowCritic",
        "PathAngleCritic",
        "PreferForwardCritic",
      ]
    ConstraintCritic:
      enabled: true
      cost_power: 1
      cost_weight: 4.0
    GoalCritic:
      enabled: true
      cost_power: 1
      cost_weight: 5.0
      threshold_to_consider: 0.2
    GoalAngleCritic:
      enabled: true
      cost_power: 1
      cost_weight: 3.0
      threshold_to_consider: 0.2
    PreferForwardCritic:
      enabled: true
      cost_power: 1
      cost_weight: 5.0
      threshold_to_consider: 0.2
    PathAlignCritic:
      enabled: true
      cost_power: 1
      cost_weight: 20.0
      max_path_occupancy_ratio: 0.05
      trajectory_point_step: 3
      threshold_to_consider: 0.2
      offset_from_furthest: 20
      use_path_orientations: false
    PathFollowCritic:
      enabled: true
      cost_power: 1
      cost_weight: 5.0
      offset_from_furthest: 5
      threshold_to_consider: 0.2
    PathAngleCritic:
      enabled: true
      cost_power: 1
      cost_weight: 2.0
      offset_from_furthest: 4
      threshold_to_consider: 0.2
      max_angle_to_furthest: 1.0
      mode: 0
    CostCritic:
      cost_weight: 10.0
