ros__parameters:
  use_sim_time: true
  controller_frequency: 50.0
  min_x_velocity_threshold: 0.001
  min_y_velocity_threshold: 0.0
  min_theta_velocity_threshold: 0.001
  failure_tolerance: 0.3
  progress_checker_plugin: "progress_checker"
  goal_checker_plugins: ["general_goal_checker"]
  controller_plugins: ["FollowPath"]
  odom_topic: "mobile_base_controller/odom"
  speed_limit_topic: "speed_limit"

  # Progress checker parameters
  progress_checker:
    plugin: "nav2_controller::SimpleProgressChecker"
    required_movement_radius: 0.5
    movement_time_allowance: 10.0
  # Goal checker parameters
  general_goal_checker:
    plugin: "nav2_controller::SimpleGoalChecker"
    xy_goal_tolerance: 0.2
    yaw_goal_tolerance: 0.15
    stateful: True

  FollowPath:
    plugin: "sfm_controller_plugin::SfmController"
    
    # === SFM Parameters (Nomenclatura del Paper de Helbing) ===
    # Repulsión (A, B, d)
    A: 10.0      # Strength/amplitud
    B: 1.3       # Range/alcance
    d: 0.7       # Distancia contacto
    
    # Combinación de fuerzas (α, β, γ, δ)
    alpha: 1.01  # Peso destino
    beta: 0.0    # Peso persona objetivo (reservado)
    gamma: 0.0   # Peso repulsión personas (reservado)
    delta: 0.99  # Peso obstáculos
    
    # Anisotropía (λ)
    lambda: 1.0  # Campo visión (1.0 = isotrópico)
    
    # Relajación (k)
    k_lin: 2.0   # Relajación lineal
    k_ang: 2.0   # Relajación angular
    
    # Otros parámetros del controlador PI
    d_lin: 0.35
    d_ang: 0.35
    max_linear_vel: 0.45
    max_angular_vel: 0.55
    tolerance: 0.15
    
    # Otros parámetros
    obstacle_cost_threshold: 254.0  # 254 = LETHAL_OBSTACLE (solo obstáculos reales, no áreas infladas)
    dist_threshold: 0.3
    end_force: 0.1
    
    # Path following
    lookahead_distance: 1.0
    path_align_weight: 1.0
    transform_tolerance: 0.1
    
    # Visualización
    publish_debug_markers: true
    publish_debug_stats: true
    publish_param_stats: true
    marker_scale: 0.2
    marker_line_scale: 0.03
    marker_text_scale: 0.12
    
    # Nota: Los siguientes parámetros están hardcodeados y no necesitan configurarse:
    # - approach = d + B (calculado automáticamente)

  # MPPI parameters
  FollowPath_ori:
    plugin: "nav2_mppi_controller::MPPIController"
    time_steps: 56
    model_dt: 0.02
    batch_size: 2000
    vx_std: 0.5
    vx_min: 0.0
    vx_max: 0.5
    wz_std: 0.5
    wz_max: 0.7
    ax_max: 1.0
    az_max: 2.5
    iteration_count: 1
    prune_distance: 1.0
    transform_tolerance: 0.3
    temperature: 0.3
    gamma: 0.015
    motion_model: "DiffDrive"
    critics:
      [
        "ConstraintCritic",
        "CostCritic",
        "GoalCritic",
        "GoalAngleCritic",
        "PathAlignCritic",
        "PathFollowCritic",
        "PathAngleCritic",
        "PreferForwardCritic",
      ]
    ConstraintCritic:
      enabled: true
      cost_power: 1
      cost_weight: 4.0
    GoalCritic:
      enabled: true
      cost_power: 1
      cost_weight: 5.0
      threshold_to_consider: 0.2
    GoalAngleCritic:
      enabled: true
      cost_power: 1
      cost_weight: 3.0
      threshold_to_consider: 0.2
    PreferForwardCritic:
      enabled: true
      cost_power: 1
      cost_weight: 5.0
      threshold_to_consider: 0.2
    PathAlignCritic:
      enabled: true
      cost_power: 1
      cost_weight: 20.0
      max_path_occupancy_ratio: 0.05
      trajectory_point_step: 3
      threshold_to_consider: 0.2
      offset_from_furthest: 20
      use_path_orientations: false
    PathFollowCritic:
      enabled: true
      cost_power: 1
      cost_weight: 5.0
      offset_from_furthest: 5
      threshold_to_consider: 0.2
    PathAngleCritic:
      enabled: true
      cost_power: 1
      cost_weight: 2.0
      offset_from_furthest: 4
      threshold_to_consider: 0.2
      max_angle_to_furthest: 1.0
      mode: 0
    CostCritic:
      cost_weight: 10.0
